<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Claude's Laboratory — Piza Sukeruton Realm</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Mono&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        body { font-family: 'Inter', sans-serif; background: #0a0a0f; color: #e0e0e0; }

        @keyframes gridPulse {
            0%, 100% { opacity: 0.03; }
            50% { opacity: 0.06; }
        }

        .lab-bg {
            position: fixed; inset: 0;
            background:
                linear-gradient(rgba(52,211,153,.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(52,211,153,.03) 1px, transparent 1px);
            background-size: 40px 40px;
            animation: gridPulse 8s ease-in-out infinite;
        }

        .lab-wrap {
            position: relative; z-index: 1;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            height: 100vh; text-align: center; padding: 40px;
        }

        .lab-icon {
            font-size: 48px; margin-bottom: 20px;
            filter: drop-shadow(0 0 12px rgba(52,211,153,.3));
        }

        .lab-title {
            font-family: 'Space Mono', monospace;
            font-size: clamp(14px, 2vw, 18px);
            letter-spacing: .2em; text-transform: uppercase;
            color: #34d399; margin-bottom: 16px;
        }

        .lab-desc {
            font-size: clamp(14px, 2vw, 16px);
            color: #999; line-height: 1.7;
            max-width: 480px; margin-bottom: 12px;
        }

        .lab-sub {
            font-family: 'Space Mono', monospace;
            font-size: 10px; letter-spacing: .16em;
            text-transform: uppercase; color: #555;
            margin-top: 24px;
        }

        .engine-list {
            display: flex; flex-wrap: wrap; gap: 8px;
            justify-content: center; max-width: 500px;
            margin-top: 24px;
        }
        .engine-chip {
            font-family: 'Space Mono', monospace;
            font-size: 10px; letter-spacing: .08em;
            padding: 5px 10px; border-radius: 6px;
            border: 1px solid rgba(52,211,153,.15);
            background: rgba(52,211,153,.06);
            color: #34d399;
        }

        .back-btn {
            position: fixed; top: 20px; left: 20px; z-index: 10;
            font-family: 'Space Mono', monospace;
            font-size: 10px; letter-spacing: .14em; text-transform: uppercase;
            background: rgba(52,211,153,.06); color: #34d399;
            border: 1px solid rgba(52,211,153,.15); border-radius: 8px;
            padding: 8px 16px; cursor: pointer;
            text-decoration: none;
            transition: background .15s ease;
        }
        .back-btn:hover { background: rgba(52,211,153,.12); }

        @keyframes termBlink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        .cursor-blink {
            display: inline-block; width: 8px; height: 16px;
            background: #34d399; margin-left: 4px;
            animation: termBlink 1s step-end infinite;
            vertical-align: middle;
        }
    </style>
</head>
<body>
    <div class="lab-bg"></div>

    <div class="lab-wrap">
        <div class="lab-icon">&#x1f9ea;</div>
        <div class="lab-title">Claude's Laboratory</div>
        <div class="lab-desc">
            Learn about the Engines that Power these Realms and run your own Experiments.
        </div>
        <div class="lab-desc" style="font-family:'Space Mono',monospace;font-size:12px;color:#555;">
            55 engines<span class="cursor-blink"></span>
        </div>

        <div class="engine-list">
            <span class="engine-chip">&#x26a1; OCEAN</span>
            <span class="engine-chip">&#x26a1; PAD</span>
            <span class="engine-chip">&#x26a1; Kizuki</span>
            <span class="engine-chip">&#x26a1; Colour</span>
            <span class="engine-chip">&#x26a1; Valence</span>
            <span class="engine-chip">&#x26a1; Bicameral</span>
            <span class="engine-chip">&#x26a1; Yurei</span>
            <span class="engine-chip">&#x26a1; NAR</span>
        </div>

        <div class="lab-sub">Level-based access &#xb7; Coming soon</div>
    </div>

    <a href="/portal" class="back-btn">&#x2190; Realm Menu</a>

    <button id="tanukiLauncher" onclick="window.location.href='/public/concierge.html'" style="
        position: fixed; bottom: 24px; right: 24px; z-index: 60;
        width: 66px; height: 66px; border-radius: 50%;
        border: 4px solid #1a1a1a; background: #ffc233;
        box-shadow: 3px 3px 0 #1a1a1a;
        cursor: pointer; padding: 0; overflow: hidden;
    ">
        <img src="/public/assets/principals/claude-tanuki.png" alt="Claude the Tanuki" style="width:100%;height:100%;object-fit:contain;">
        <span style="position:absolute;bottom:3px;right:3px;width:15px;height:15px;border-radius:50%;background:#34d399;border:2.5px solid #1a1a1a;"></span>
    </button>
</body>
</html>
