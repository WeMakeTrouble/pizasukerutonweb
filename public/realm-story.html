<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>The Story — Piza Sukeruton Realm</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Mochiy+Pop+One&family=Space+Mono&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        body { font-family: 'Zen Kaku Gothic New', sans-serif; background: #000; color: #fdf7ec; }

        @keyframes flicker {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 0.85; }
        }

        .story-wrap {
            position: relative;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            height: 100vh; text-align: center; padding: 40px;
        }

        .story-icon {
            font-size: 64px; margin-bottom: 24px;
            animation: flicker 4s ease-in-out infinite;
        }

        .story-title {
            font-family: 'Mochiy Pop One', sans-serif;
            font-size: clamp(22px, 3.5vw, 32px);
            color: #fdf7ec; margin-bottom: 16px;
        }

        .story-desc {
            font-size: clamp(14px, 2vw, 18px);
            color: rgba(253,247,236,.5); line-height: 1.7;
            max-width: 480px; margin-bottom: 12px;
        }

        .story-sub {
            font-family: 'Space Mono', monospace;
            font-size: 10px; letter-spacing: .16em;
            text-transform: uppercase; color: rgba(253,247,236,.25);
            margin-top: 32px;
        }

        .back-btn {
            position: fixed; top: 20px; left: 20px; z-index: 10;
            font-family: 'Space Mono', monospace;
            font-size: 10px; letter-spacing: .14em; text-transform: uppercase;
            background: rgba(253,247,236,.06); color: rgba(253,247,236,.5);
            border: 1.5px solid rgba(253,247,236,.12); border-radius: 8px;
            padding: 8px 16px; cursor: pointer;
            text-decoration: none;
            transition: background .15s ease;
        }
        .back-btn:hover { background: rgba(253,247,236,.12); }
    </style>
</head>
<body>
    <div class="story-wrap">
        <div class="story-icon">&#x1f355;&#x1f480;</div>
        <div class="story-title">The Story</div>
        <div class="story-desc">
            The tale of a Skeleton who really loves Pizza,<br>
            a Vengeful Pineapple Ghost,<br>
            and a Mischievous Tanuki.
        </div>
        <div class="story-sub">Coming soon</div>
    </div>

    <a href="/portal" class="back-btn">&#x2190; Realm Menu</a>

    <button id="tanukiLauncher" onclick="window.location.href='/public/concierge.html'" style="
        position: fixed; bottom: 24px; right: 24px; z-index: 60;
        width: 66px; height: 66px; border-radius: 50%;
        border: 4px solid #1a1a1a; background: #ffc233;
        box-shadow: 3px 3px 0 #1a1a1a;
        cursor: pointer; padding: 0; overflow: hidden;
    ">
        <img src="/public/assets/principals/claude-tanuki.png" alt="Claude the Tanuki" style="width:100%;height:100%;object-fit:contain;">
        <span style="position:absolute;bottom:3px;right:3px;width:15px;height:15px;border-radius:50%;background:#34d399;border:2.5px solid #1a1a1a;"></span>
    </button>
</body>
</html>
