<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>The Expanse — Piza Sukeruton Realm</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Mochiy+Pop+One&family=Space+Mono&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        body { font-family: 'Zen Kaku Gothic New', sans-serif; }

        .void {
            position: fixed; inset: 0;
            background: #f3f1ee;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            text-align: center; padding: 40px;
        }

        @keyframes drift {
            0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.18; }
            25% { transform: translate(30px, -20px) scale(1.1); opacity: 0.25; }
            50% { transform: translate(-15px, 15px) scale(0.95); opacity: 0.12; }
            75% { transform: translate(20px, 10px) scale(1.05); opacity: 0.22; }
        }

        .leak {
            position: absolute; border-radius: 50%;
            filter: blur(60px);
            animation: drift 12s ease-in-out infinite;
        }

        .title {
            font-family: 'Space Mono', monospace;
            font-size: clamp(11px, 1.8vw, 14px);
            letter-spacing: .3em; text-transform: uppercase;
            color: #7b6f86; margin-bottom: 24px;
            opacity: 0.7;
        }

        .message {
            font-family: 'Zen Kaku Gothic New', sans-serif;
            font-size: clamp(16px, 2.5vw, 22px);
            color: #7b6f86; line-height: 1.7;
            max-width: 440px; opacity: 0.6;
        }

        .sub {
            font-family: 'Space Mono', monospace;
            font-size: 10px; letter-spacing: .16em;
            text-transform: uppercase; color: #b0a8b8;
            margin-top: 40px; opacity: 0.5;
        }

        .back-btn {
            position: fixed; top: 20px; left: 20px; z-index: 10;
            font-family: 'Space Mono', monospace;
            font-size: 10px; letter-spacing: .14em; text-transform: uppercase;
            background: rgba(123,111,134,.08); color: #7b6f86;
            border: 1.5px solid rgba(123,111,134,.2); border-radius: 8px;
            padding: 8px 16px; cursor: pointer;
            text-decoration: none;
            transition: background .15s ease;
        }
        .back-btn:hover { background: rgba(123,111,134,.15); }
    </style>
</head>
<body>
    <div class="void">
        <div class="leak" style="width:300px;height:300px;background:#7b6f86;top:15%;left:20%;animation-delay:-2s;"></div>
        <div class="leak" style="width:200px;height:200px;background:#a89bb0;bottom:20%;right:15%;animation-delay:-5s;"></div>
        <div class="leak" style="width:250px;height:250px;background:#c5b8d0;top:50%;left:55%;animation-delay:-8s;"></div>
        <div class="leak" style="width:180px;height:180px;background:#8b7e96;bottom:30%;left:30%;animation-delay:-3s;"></div>

        <div class="title">The Expanse</div>
        <div class="message">
            Pineaple Yurei's Realm.<br>
            Where He traps the Mutai in constant Despair.<br><br>
            There is no ground here. No horizon.<br>
            Only colour that leaks from fractured things.
        </div>
        <div class="sub">Coming soon</div>
    </div>

    <a href="/portal" class="back-btn">&#x2190; Realm Menu</a>

    <button id="tanukiLauncher" onclick="window.location.href='/public/concierge.html'" style="
        position: fixed; bottom: 24px; right: 24px; z-index: 60;
        width: 66px; height: 66px; border-radius: 50%;
        border: 4px solid #1a1a1a; background: #ffc233;
        box-shadow: 3px 3px 0 #1a1a1a;
        cursor: pointer; padding: 0; overflow: hidden;
    ">
        <img src="/public/assets/principals/claude-tanuki.png" alt="Claude the Tanuki" style="width:100%;height:100%;object-fit:contain;">
        <span style="position:absolute;bottom:3px;right:3px;width:15px;height:15px;border-radius:50%;background:#34d399;border:2.5px solid #1a1a1a;"></span>
    </button>
</body>
</html>
