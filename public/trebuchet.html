document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

3); padding:0; }\n  .ws-swatch span { flex:1; }\n  .ws-swatch.sel { border-color:#e6a93a; box-shadow:0 0 0 2px rgba(236,169,58,0.4); }\n\n  /* ---- realm map ---- */\n  #realmBtn { position:fixed; top:14px; left:16px; z-index:6; display:flex; align-items:center; gap:7px;\n    padding:9px 13px; border-radius:12px; background:var(--panel); backdrop-filter:blur(8px);\n    border:1.5px solid rgba(120,90,52,0.35); color:var(--ink); box-shadow:0 6px 20px rgba(40,30,10,0.18);\n    font-family:inherit; font-size:13px; font-weight:700; cursor:pointer; transition:filter .12s; }\n  #realmBtn:hover { filter:brightness(1.05); }\n  #realmMap { position:fixed; inset:0; z-index:31; display:none; }\n  #realmMap.on { display:block; }\n  .rm-scrim { position:absolute; inset:0; background:rgba(18,12,6,0.5); backdrop-filter:blur(3px); }\n  .rm-modal { position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); width:560px;\n    max-width:calc(100vw - 28px); max-height:calc(100vh - 28px); overflow:auto; background:#fdf7ec;\n    border:1.5px solid rgba(120,90,52,0.45); border-radius:18px; box-shadow:0 24px 60px rgba(28,18,6,0.45);\n    padding:20px; color:var(--ink); }\n  .rm-h { font-size:20px; font-weight:800; margin-bottom:3px; }\n  .rm-sub { font-size:12.5px; opacity:.62; margin-bottom:14px; text-wrap:pretty; }\n  .rm-realm { display:flex; align-items:center; gap:13px; padding:11px 12px; border-radius:13px; margin-bottom:9px;\n    background:#fff; border:1.5px solid rgba(120,90,52,0.18); }\n  .rm-realm.locked { opacity:.6; }\n  .rm-realm.active { border-color:#e6a93a; box-shadow:0 0 0 2px rgba(236,169,58,0.32); }\n  .rm-dot { width:42px; height:42px; border-radius:50%; flex:0 0 auto; display:grid; place-items:center; font-size:21px; }\n  .rm-name { font-size:15px; font-weight:800; }\n  .rm-jp { font-size:11px; opacity:.55; font-weight:600; }\n  .rm-desc { font-size:12px; opacity:.72; margin-top:2px; text-wrap:pretty; }\n  .rm-tag { margin-left:auto; font-size:11px; font-weight:800; padding:4px 10px; border-radius:999px; flex:0 0 auto; white-space:nowrap; }\n  .rm-tag.on { background:#e8f6ec; color:#2f7d45; }\n  .rm-tag.soon { background:#efe7d6; color:#8a6638; }\n  .rm-close { margin-top:6px; width:100%; padding:11px; cursor:pointer; font-family:inherit; font-weight:700;\n    background:#efe7d6; color:var(--ink); border:1.5px solid rgba(120,90,52,0.3); border-radius:11px; }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n  <canvas id=\"view\"><\u002Fcanvas>\n\n  <button id=\"howToBtn\" type=\"button\" aria-label=\"How to play\"><span class=\"q\">?<\u002Fspan>How to play<\u002Fbutton>\n  <button id=\"soundBtn\" type=\"button\" aria-label=\"Mute\">🔊<\u002Fbutton>\n  <button id=\"realmBtn\" type=\"button\" aria-label=\"Realm map\">🗺 Realms<\u002Fbutton>\n\n  <!-- character artwork, used by the canvas (drawTanuki/drawYurei) and the tutorial avatars; inlined by the bundler -->\n  <img id=\"spr-claude\" src=\"61551540-d123-4781-8189-56b61ef0dc6b\" alt=\"\" hidden=\"\">\n  <img id=\"spr-yurei\" src=\"00e661b7-fc63-494c-9745-fdde45082b6d\" alt=\"\" hidden=\"\">\n\n  <div id=\"stats\">\n    <div class=\"stat\"><div class=\"k\">Distance<\u002Fdiv><div class=\"v\" id=\"dist\">0 m<\u002Fdiv><\u002Fdiv>\n    <div class=\"stat\"><div class=\"k\">Speed<\u002Fdiv><div class=\"v\" id=\"speed\">0 m/s<\u002Fdiv><\u002Fdiv>\n    <div class=\"stat\"><div class=\"k\">Launch<\u002Fdiv><div class=\"v\" id=\"elev\">—<\u002Fdiv><\u002Fdiv>\n    <div class=\"stat best\"><div class=\"k\">Best<\u002Fdiv><div class=\"v\" id=\"best\">0 m<\u002Fdiv><\u002Fdiv>\n    <div class=\"stat wind\"><div class=\"k\">Wind<\u002Fdiv><div class=\"v\" id=\"wind\">—<\u002Fdiv><\u002Fdiv>\n    <div class=\"stat rescued\"><div class=\"k\">Rescued<\u002Fdiv><div class=\"v\" id=\"rescued\">0/3<\u002Fdiv><\u002Fdiv>\n    <div class=\"stat scrap\"><div class=\"k\">Scrap ⚙<\u002Fdiv><div class=\"v\" id=\"scrap\">0<\u002Fdiv><\u002Fdiv>\n    <div class=\"stat bombs\" id=\"bombsStat\" style=\"display:none\"><div class=\"k\">Bombs 🔥<\u002Fdiv><div class=\"v\" id=\"bombs\">0<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n\n  <div id=\"panel\">\n    <h1>Trebuchet<\u002Fh1>\n    <div class=\"ctrl\">\n      <label>Counterweight <span id=\"cwMass-val\"><\u002Fspan><\u002Flabel>\n      <input type=\"range\" id=\"cwMass\" min=\"60\" max=\"360\" step=\"5\" value=\"170\">\n    <\u002Fdiv>\n    <div class=\"ctrl\">\n      <label>Sling length <span id=\"slingLen-val\"><\u002Fspan><\u002Flabel>\n      <input type=\"range\" id=\"slingLen\" min=\"90\" max=\"280\" step=\"5\" value=\"200\">\n    <\u002Fdiv>\n    <div class=\"ctrl\">\n      <label>Arm ratio (long:short) <span id=\"armRatio-val\"><\u002Fspan><\u002Flabel>\n      <input type=\"range\" id=\"armRatio\" min=\"1.5\" max=\"5\" step=\"0.1\" value=\"2.8\">\n    <\u002Fdiv>\n    <div class=\"ctrl\">\n      <label>Release angle <span id=\"releaseElev-val\"><\u002Fspan><\u002Flabel>\n      <input type=\"range\" id=\"releaseElev\" min=\"15\" max=\"75\" step=\"1\" value=\"45\">\n    <\u002Fdiv>\n    <button id=\"ammoBtn\" type=\"button\" title=\"Choose ammo (Q)\"><span id=\"ammoChip\" class=\"ammo-chip\"><\u002Fspan><span class=\"ammo-caret\">▾<\u002Fspan><\u002Fbutton>\n    <div class=\"btns\">\n      <button id=\"fireBtn\">FIRE<\u002Fbutton>\n      <button id=\"resetBtn\">Reset<\u002Fbutton>\n    <\u002Fdiv>\n    <div class=\"ctrl\" id=\"fbCtrl\" style=\"display:none; margin-top:10px; margin-bottom:0;\">\n      <button id=\"fbBtn\">🔥 Fire Bomb ×3<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"hint\"><b>Space<\u002Fb> fire &nbsp;·&nbsp; <b>Q<\u002Fb> ammo &nbsp;·&nbsp; <b>1–6<\u002Fb> pick &nbsp;·&nbsp; <b>B<\u002Fb> workshop &nbsp;·&nbsp; <b>R<\u002Fb> reset &nbsp;·&nbsp; <b>N<\u002Fb> new game<\u002Fdiv>\n\n  <!-- ammo radial quick-select -->\n  <div id=\"ammoRadial\">\n    <div class=\"ammo-backdrop\"><\u002Fdiv>\n    <div class=\"ammo-ring\"><\u002Fdiv>\n    <div class=\"ammo-hub\"><span>Pick ammo<\u002Fspan><small>1–6 · click<\u002Fsmall><\u002Fdiv>\n  <\u002Fdiv>\n  <div id=\"ammoToasts\"><\u002Fdiv>\n\n  <!-- workshop clickable hotspot + upgrade bench -->\n  <button id=\"wsHotspot\" type=\"button\" aria-label=\"Open workshop\" title=\"Open the workshop\"><\u002Fbutton>\n  <div id=\"workshop\">\n    <div class=\"ws-scrim\"><\u002Fdiv>\n    <div class=\"ws-modal\">\n      <div class=\"ws-top\">\n        <div class=\"ws-h\">🔨 Workshop<\u002Fdiv>\n        <div class=\"ws-bal-wrap\">Scrap <span class=\"ws-bal\">0<\u002Fspan> ⚙<\u002Fdiv>\n        <button class=\"ws-close\" type=\"button\" aria-label=\"Close\">✕<\u002Fbutton>\n      <\u002Fdiv>\n      <div class=\"ws-sub\">Spend the scrap your freed friends haul in. Pan here and click whenever you're not mid-shot.<\u002Fdiv>\n      <div class=\"ws-track\" data-track=\"power\">\n        <div class=\"ws-ic\">🏋️<\u002Fdiv>\n        <div class=\"ws-meta\"><div class=\"ws-name\">Counterweight<\u002Fdiv><div class=\"ws-eff\"><\u002Fdiv><div class=\"ws-pips\"><\u002Fdiv><\u002Fdiv>\n        <button class=\"ws-buy\" data-track=\"power\" type=\"button\"><\u002Fbutton>\n      <\u002Fdiv>\n      <div class=\"ws-track\" data-track=\"aim\">\n        <div class=\"ws-ic\">🎯<\u002Fdiv>\n        <div class=\"ws-meta\"><div class=\"ws-name\">Aim spirits<\u002Fdiv><div class=\"ws-eff\"><\u002Fdiv><div class=\"ws-pips\"><\u002Fdiv><\u002Fdiv>\n        <button class=\"ws-buy\" data-track=\"aim\" type=\"button\"><\u002Fbutton>\n      <\u002Fdiv>\n      <div class=\"ws-track\" data-track=\"capacity\">\n        <div class=\"ws-ic\">🎒<\u002Fdiv>\n        <div class=\"ws-meta\"><div class=\"ws-name\">Ammo pouch<\u002Fdiv><div class=\"ws-eff\"><\u002Fdiv><div class=\"ws-pips\"><\u002Fdiv><\u002Fdiv>\n        <button class=\"ws-buy\" data-track=\"capacity\" type=\"button\"><\u002Fbutton>\n      <\u002Fdiv>\n      <div class=\"ws-track ws-paint-row\">\n        <div class=\"ws-ic\">🎨<\u002Fdiv>\n        <div class=\"ws-meta\"><div class=\"ws-name\">Paint &amp; banner<\u002Fdiv><div class=\"ws-eff\" style=\"opacity:.66\">Recolour your machine — free<\u002Fdiv><div class=\"ws-swatches\"><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- realm map scaffold -->\n  <div id=\"realmMap\">\n    <div class=\"rm-scrim\"><\u002Fdiv>\n    <div class=\"rm-modal\">\n      <div class=\"rm-h\">🗺 Realms of the Tanuki<\u002Fdiv>\n      <div class=\"rm-sub\">Pineaple Yurei's curse has spread across six yokai realms. Free every captive in one to open its workshop and journey on. A phantom of him guards each realm — the true ghost waits in Yomi.<\u002Fdiv>\n      <div class=\"rm-realm active\">\n        <div class=\"rm-dot\" style=\"background:#ffd9e2\">🌸<\u002Fdiv>\n        <div><div class=\"rm-name\">Momo-no-Sato<\u002Fdiv><div class=\"rm-jp\">桃の里 · Peach-Blossom Vale<\u002Fdiv><div class=\"rm-desc\">Home realm. Daruma &amp; foxfire; peaches that ward off spirits.<\u002Fdiv><\u002Fdiv>\n        <div class=\"rm-tag on\">Now playing<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"rm-realm locked\">\n        <div class=\"rm-dot\" style=\"background:#d6ecd2\">🎋<\u002Fdiv>\n        <div><div class=\"rm-name\">Take-no-Mori<\u002Fdiv><div class=\"rm-jp\">竹の森 · Misty Bamboo<\u002Fdiv><div class=\"rm-desc\">Kitsune country — foxfire and curving magatama beads.<\u002Fdiv><\u002Fdiv>\n        <div class=\"rm-tag soon\">Soon<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"rm-realm locked\">\n        <div class=\"rm-dot\" style=\"background:#dbeefb\">🏔️<\u002Fdiv>\n        <div><div class=\"rm-name\">Yuki-no-Mine<\u002Fdiv><div class=\"rm-jp\">雪の嶺 · Frostpeak<\u002Fdiv><div class=\"rm-desc\">Yuki-onna's snowfield — frost that stills the air.<\u002Fdiv><\u002Fdiv>\n        <div class=\"rm-tag soon\">Soon<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"rm-realm locked\">\n        <div class=\"rm-dot\" style=\"background:#efe3b8\">⚡<\u002Fdiv>\n        <div><div class=\"rm-name\">Kaminari-dai<\u002Fdiv><div class=\"rm-jp\">雷台 · Thunder Plateau<\u002Fdiv><div class=\"rm-desc\">Raijin's storm — the chain-lightning Raijū roams here.<\u002Fdiv><\u002Fdiv>\n        <div class=\"rm-tag soon\">Soon<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"rm-realm locked\">\n        <div class=\"rm-dot\" style=\"background:#cfe6ef\">🐉<\u002Fdiv>\n        <div><div class=\"rm-name\">Ryūgū-jō<\u002Fdiv><div class=\"rm-jp\">竜宮城 · Dragon Palace Depths<\u002Fdiv><div class=\"rm-desc\">Ryujin's undersea court — the quake-catfish Namazu stirs.<\u002Fdiv><\u002Fdiv>\n        <div class=\"rm-tag soon\">Soon<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"rm-realm locked\">\n        <div class=\"rm-dot\" style=\"background:#e2d4ee\">💀<\u002Fdiv>\n        <div><div class=\"rm-name\">Yomi-no-Kuni<\u002Fdiv><div class=\"rm-jp\">黄泉の国 · Shadow Underworld<\u002Fdiv><div class=\"rm-desc\">Where the curse is rooted. The true Pineaple Yurei awaits.<\u002Fdiv><\u002Fdiv>\n        <div class=\"rm-tag soon\">Finale<\u002Fdiv>\n      <\u002Fdiv>\n      <button class=\"rm-close\" type=\"button\">Close<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  \n  <script src=\"965b45e4-e528-41c0-be6d-12a45ad6f6b6\"><\u002Fscript>\n  <script src=\"2019d584-5ae3-4006-9b41-bf9bdf29c2c0\"><\u002Fscript>\n  <script src=\"a9e8d5ee-bbb8-44ba-bc02-2ced289e5dca\"><\u002Fscript>\n  <script src=\"fadb5cbb-a830-4d70-a2b3-30ab17afb76c\"><\u002Fscript>\n  <script src=\"40009aca-4d83-49b4-b5be-696779b2fbe2\"><\u002Fscript>\n  <script src=\"2fe29911-4cad-4c35-b8c1-e86b100f94e8\"><\u002Fscript>\n  <script src=\"05411e4d-d25b-4447-aae7-8ecf77f83a5e\"><\u002Fscript>\n  <script src=\"61fc7a25-8f5c-4c5e-bb8d-00f86991e483\"><\u002Fscript>\n  <script src=\"9e4f36be-dc29-4d98-9b37-1bae790824c2\"><\u002Fscript>\n  <script src=\"b48c81d7-1380-429c-891f-55a3ad7ff048\"><\u002Fscript>\n  <script>\n    (function(){\n      var b=document.getElementById('realmBtn'), m=document.getElementById('realmMap');\n      function open(){ if(m) m.classList.add('on'); }\n      function close(){ if(m) m.classList.remove('on'); }\n      if(b) b.addEventListener('click', open);\n      if(m){ m.querySelector('.rm-scrim').addEventListener('pointerdown', close);\n             m.querySelector('.rm-close').addEventListener('click', close); }\n      window.addEventListener('keydown', function(e){ if(e.key==='Escape') close(); });\n    })();\n  <\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
