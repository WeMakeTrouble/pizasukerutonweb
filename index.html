<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ピザスケルトン — Piza Sukeruton</title>
    <meta name="description" content="Piza Sukeruton — ピザスケルトン">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
        html, body { width:100%; height:100%; overflow:hidden; }
        body { position:relative; font-family:'Share Tech Mono',monospace; }
        .bg-image { position:fixed; top:0; left:0; width:100%; height:100%; object-fit:cover; object-position:center center; z-index:0; }
        .action-bar { position:fixed; bottom:40px; left:50%; transform:translateX(-50%); z-index:10; display:flex; flex-direction:column; gap:10px; align-items:center; }
        .action-btn { font-family:'Share Tech Mono',monospace; font-size:18px; padding:16px 48px; border:2px solid #000; background:#000; color:#00ff75; cursor:pointer; letter-spacing:0.1em; text-transform:uppercase; transition:background 0.2s,color 0.2s; white-space:nowrap; min-width:280px; text-align:center; }
        .action-btn:hover { background:#00ff75; color:#000; }
        .action-btn:disabled { opacity:0.5; cursor:not-allowed; }
        .modal-backdrop { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:100; align-items:center; justify-content:center; }
        .modal-box { position:relative; background:#000; border:2px solid #00ff75; padding:32px 24px 24px; max-width:520px; width:90%; }
        .modal-close { position:absolute; top:12px; right:16px; background:none; border:none; color:#00ff75; font-family:'Share Tech Mono',monospace; font-size:22px; cursor:pointer; letter-spacing:0.1em; }
        .login-title { color:#00ff75; font-family:'Share Tech Mono',monospace; font-size:20px; letter-spacing:0.15em; text-transform:uppercase; margin-bottom:28px; text-align:center; }
        .login-field { display:block; width:100%; font-family:'Share Tech Mono',monospace; font-size:16px; padding:14px 16px; border:2px solid #00ff75; background:rgba(0,255,117,0.05); color:#00ff75; outline:none; letter-spacing:0.05em; margin-bottom:14px; }
        .login-field::placeholder { color:#00ff75; opacity:0.35; }
        .login-field:focus { background:rgba(0,255,117,0.1); }
        .login-submit { display:block; width:100%; font-family:'Share Tech Mono',monospace; font-size:18px; padding:16px 20px; border:2px solid #00ff75; background:#00ff75; color:#000; cursor:pointer; letter-spacing:0.1em; text-transform:uppercase; transition:background 0.2s,color 0.2s; margin-top:8px; }
        .login-submit:hover { background:#000; color:#00ff75; }
        .login-submit:disabled { opacity:0.5; cursor:not-allowed; }
        .login-error { color:#ff4444; font-size:14px; letter-spacing:0.05em; margin-top:14px; text-align:center; min-height:20px; }
        @media (max-width:520px) { .action-bar { bottom:24px; width:90%; } .action-btn { width:100%; text-align:center; font-size:16px; padding:14px 36px; } }
    </style>
</head>
<body>
    <img src="pizafrontpageweb.png" alt="Piza Sukeruton" class="bg-image">
    <div class="action-bar">
        <button class="action-btn" id="joinBtn">Join the list</button>
        <button class="action-btn" id="loginBtn">Enter the Realm</button>
    </div>
    <div class="modal-backdrop" id="substackModal">
        <div class="modal-box">
            <button class="modal-close" id="substackClose">✕</button>
            <iframe src="https://jstrakertroublemaker.substack.com/embed" width="100%" height="320" style="border:none;background:white;display:block;" frameborder="0" scrolling="no"></iframe>
        </div>
    </div>
    <div class="modal-backdrop" id="loginModal">
        <div class="modal-box">
            <button class="modal-close" id="loginClose">✕</button>
            <div class="login-title">Enter the Realm</div>
            <form id="loginForm" autocomplete="on">
                <input type="email" class="login-field" id="loginEmail" name="email" placeholder="email" autocomplete="email" required>
                <input type="password" class="login-field" id="loginPassword" name="password" placeholder="password" autocomplete="current-password" required>
                <button type="submit" class="login-submit" id="loginSubmit">Enter</button>
                <div class="login-error" id="loginError"></div>
            </form>
        </div>
    </div>
    <script>
        const substackModal=document.getElementById("substackModal");
        const joinBtn=document.getElementById("joinBtn");
        const substackClose=document.getElementById("substackClose");
        joinBtn.addEventListener("click",()=>{substackModal.style.display="flex";});
        substackClose.addEventListener("click",()=>{substackModal.style.display="none";});
        substackModal.addEventListener("click",(e)=>{if(e.target===substackModal)substackModal.style.display="none";});
        const loginModal=document.getElementById("loginModal");
        const loginBtn=document.getElementById("loginBtn");
        const loginClose=document.getElementById("loginClose");
        const loginForm=document.getElementById("loginForm");
        const loginError=document.getElementById("loginError");
        const loginSubmit=document.getElementById("loginSubmit");
        loginBtn.addEventListener("click",()=>{loginModal.style.display="flex";document.getElementById("loginEmail").focus();});
        loginClose.addEventListener("click",()=>{loginModal.style.display="none";loginError.textContent="";});
        loginModal.addEventListener("click",(e)=>{if(e.target===loginModal){loginModal.style.display="none";loginError.textContent="";}});
        loginForm.addEventListener("submit",async(e)=>{e.preventDefault();loginError.textContent="";loginSubmit.disabled=true;loginSubmit.textContent="...";try{const res=await fetch("/api/auth/login",{method:"POST",headers:{"Content-Type":"application/json"},credentials:"same-origin",body:JSON.stringify({email:document.getElementById("loginEmail").value.trim(),password:document.getElementById("loginPassword").value})});if(!res.ok){const data=await res.json().catch(()=>({}));loginError.textContent=data.error||"Wrong email or password.";loginSubmit.disabled=false;loginSubmit.textContent="Enter";return;}window.location.href="/portal";}catch(err){loginError.textContent="Connection failed. Try again.";loginSubmit.disabled=false;loginSubmit.textContent="Enter";}});
        (async()=>{try{const res=await fetch("/api/auth/me",{credentials:"same-origin"});const data=await res.json();if(data.user)window.location.href="/portal";}catch(_){}})();
    </script>
</body>
</html>
