<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ピザスケルトン — Piza Sukeruton</title>
    <meta name="description" content="Piza Sukeruton — ピザスケルトン">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            position: relative;
            font-family: 'Share Tech Mono', monospace;
        }

        /* ── Full-screen background image ─────────────────────────── */

        .bg-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center center;
            z-index: 0;
        }

        /* ── Newsletter signup ────────────────────────────────────── */

        .signup-container {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            text-align: center;
        }

        .signup-label {
            color: #000;
            font-size: 13px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 12px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        .signup-form {
            display: flex;
            gap: 0;
            align-items: stretch;
        }

        .signup-input {
            font-family: 'Share Tech Mono', monospace;
            font-size: 14px;
            padding: 10px 16px;
            border: 2px solid #000;
            border-right: none;
            background: rgba(0, 0, 0, 0.85);
            color: #00ff75;
            outline: none;
            width: 280px;
            letter-spacing: 0.05em;
        }

        .signup-input::placeholder {
            color: #00ff75;
            opacity: 0.4;
        }

        .signup-input:focus {
            background: rgba(0, 0, 0, 0.95);
        }

        .signup-btn {
            font-family: 'Share Tech Mono', monospace;
            font-size: 13px;
            padding: 10px 20px;
            border: 2px solid #000;
            background: #000;
            color: #00ff75;
            cursor: pointer;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            transition: background 0.2s, color 0.2s;
            white-space: nowrap;
        }

        .signup-btn:hover {
            background: #00ff75;
            color: #000;
        }

        .signup-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .signup-msg {
            margin-top: 10px;
            font-size: 12px;
            letter-spacing: 0.1em;
            min-height: 18px;
            color: #000;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        .signup-msg.ok { color: #004d25; }
        .signup-msg.err { color: #8b0000; }

        /* ── Mobile ───────────────────────────────────────────────── */

        @media (max-width: 520px) {
            .signup-container {
                bottom: 24px;
                width: 90%;
            }

            .signup-form {
                flex-direction: column;
                gap: 0;
            }

            .signup-input {
                width: 100%;
                border-right: 2px solid #000;
                border-bottom: none;
            }

            .signup-btn {
                width: 100%;
            }

            .signup-label {
                font-size: 11px;
            }
        }
    </style>
</head>
<body>

    <img src="pizafrontpageweb.png" alt="Piza Sukeruton" class="bg-image">

    <div class="signup-container">
        <div class="signup-label">Join the list</div>
        <form class="signup-form" id="signupForm">
            <input
                type="email"
                class="signup-input"
                id="emailInput"
                placeholder="enter your email"
                required
                autocomplete="email"
                spellcheck="false"
            >
            <button type="submit" class="signup-btn" id="submitBtn">Submit</button>
        </form>
        <div class="signup-msg" id="signupMsg"></div>
    </div>

    <script>
        // ── Configuration ────────────────────────────────────────
        // Change this to the production API URL when the backend is deployed
        const API_BASE = 'https://theexpansev011.onrender.com';

        // ── Form handler ─────────────────────────────────────────
        const form = document.getElementById('signupForm');
        const input = document.getElementById('emailInput');
        const btn = document.getElementById('submitBtn');
        const msg = document.getElementById('signupMsg');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = input.value.trim();
            if (!email) return;

            btn.disabled = true;
            btn.textContent = '...';
            msg.textContent = '';
            msg.className = 'signup-msg';

            try {
                const res = await fetch(`${API_BASE}/api/newsletter/subscribe`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const data = await res.json();

                msg.textContent = data.message;
                msg.className = `signup-msg ${data.success ? 'ok' : 'err'}`;

                if (data.success) {
                    input.value = '';
                }
            } catch (err) {
                msg.textContent = 'Connection failed. Try again later.';
                msg.className = 'signup-msg err';
            }

            btn.disabled = false;
            btn.textContent = 'Submit';
        });
    </script>

</body>
</html>
