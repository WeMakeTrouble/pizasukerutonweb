<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ピザスケルトン — Piza Sukeruton</title>
    <meta name="description" content="Piza Sukeruton — ピザスケルトン">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            position: relative;
            font-family: 'Share Tech Mono', monospace;
        }

        /* ── Full-screen background image ─────────────────────────── */

        .bg-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center center;
            z-index: 0;
        }

        /* ── Newsletter signup ────────────────────────────────────── */

        .signup-container {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            text-align: center;
        }

        .signup-label {
            color: #000;
            font-size: 13px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 12px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        .signup-form {
            display: flex;
            gap: 0;
            align-items: stretch;
        }

        .signup-input {
            font-family: 'Share Tech Mono', monospace;
            font-size: 14px;
            padding: 10px 16px;
            border: 2px solid #000;
            border-right: none;
            background: rgba(0, 0, 0, 0.85);
            color: #00ff75;
            outline: none;
            width: 280px;
            letter-spacing: 0.05em;
        }

        .signup-input::placeholder {
            color: #00ff75;
            opacity: 0.4;
        }

        .signup-input:focus {
            background: rgba(0, 0, 0, 0.95);
        }

        .signup-btn {
            font-family: 'Share Tech Mono', monospace;
            font-size: 13px;
            padding: 10px 20px;
            border: 2px solid #000;
            background: #000;
            color: #00ff75;
            cursor: pointer;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            transition: background 0.2s, color 0.2s;
            white-space: nowrap;
        }

        .signup-btn:hover {
            background: #00ff75;
            color: #000;
        }

        .signup-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .signup-msg {
            margin-top: 10px;
            font-size: 12px;
            letter-spacing: 0.1em;
            min-height: 18px;
            color: #000;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        .signup-msg.ok { color: #004d25; }
        .signup-msg.err { color: #8b0000; }

        /* ── Mobile ───────────────────────────────────────────────── */

        @media (max-width: 520px) {
            .signup-container {
                bottom: 24px;
                width: 90%;
            }

            .signup-form {
                flex-direction: column;
                gap: 0;
            }

            .signup-input {
                width: 100%;
                border-right: 2px solid #000;
                border-bottom: none;
            }

            .signup-btn {
                width: 100%;
            }

            .signup-label {
                font-size: 11px;
            }
        }
    </style>
</head>
<body>

    <img src="pizafrontpageweb.png" alt="Piza Sukeruton" class="bg-image">

    <div class="signup-container">
        <button class="signup-btn" id="joinBtn">Join the list</button>
    </div>

    <!-- ── Substack popup modal ──────────────────────────────── -->
    <div id="substackModal" style="
        display: none;
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(0, 0, 0, 0.85);
        z-index: 100;
        align-items: center;
        justify-content: center;
    ">
        <div style="
            position: relative;
            background: #000;
            border: 2px solid #00ff75;
            padding: 32px 24px 24px;
            max-width: 520px;
            width: 90%;
        ">
            <button id="modalClose" style="
                position: absolute;
                top: 10px; right: 14px;
                background: none;
                border: none;
                color: #00ff75;
                font-family: 'Share Tech Mono', monospace;
                font-size: 18px;
                cursor: pointer;
                letter-spacing: 0.1em;
            ">✕</button>
            <iframe
                src="https://jstrakertroublemaker.substack.com/embed"
                width="100%"
                height="320"
                style="border: none; background: white; display: block;"
                frameborder="0"
                scrolling="no">
            </iframe>
        </div>
    </div>

    <script>
        const modal = document.getElementById('substackModal');
        const joinBtn = document.getElementById('joinBtn');
        const closeBtn = document.getElementById('modalClose');

        joinBtn.addEventListener('click', () => {
            modal.style.display = 'flex';
        });

        closeBtn.addEventListener('click', () => {
            modal.style.display = 'none';
        });

        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                modal.style.display = 'none';
            }
        });
    </script>

</body>
</html>
